services:
  - type: web
    name: manifest
    env: node
    plan: free
    region: ohio # Match Supabase region for lowest latency
    # NODE_OPTIONS is set here for BUILD time only — overriding in startCommand for runtime
    buildCommand: export NODE_OPTIONS="--max-old-space-size=4096" && npm install --include=dev && npx turbo build --filter=manifest-backend --filter=manifest-frontend --filter=manifest-shared --concurrency=1
    startCommand: npm start
    healthCheckPath: /api/v1/health
    # autoDeploy: false = manual upstream sync only (one-click deploy in Render dashboard)
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

      - key: BIND_ADDRESS
        value: 0.0.0.0

      - key: TRUST_PROXY
        value: "1"

      # Runtime memory limit (400MB of 512MB free tier, leaving headroom for OS)
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"

      # Disable upstream telemetry for privacy
      - key: MANIFEST_TELEMETRY_DISABLED
        value: "1"

      # ─── SECURITY: Set ALL of these before first deploy ───────────────────
      # Your Render app URL (update after first deploy)
      - key: BETTER_AUTH_URL
        value: https://manifest-rck1.onrender.com

      # REQUIRED: min 32 chars, used for session signing
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: BETTER_AUTH_SECRET
        value: CHANGE_ME_TO_A_64_CHAR_RANDOM_SECRET

      # REQUIRED: separate key for at-rest encryption of stored API keys
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: MANIFEST_ENCRYPTION_KEY
        value: CHANGE_ME_TO_A_DIFFERENT_64_CHAR_SECRET

      # Set to 'true' AFTER you have created your account to lock signups
      - key: DISABLE_SIGNUP
        value: "false"

      # Your database URL (Supabase Ohio, transaction mode port 6543)
      - key: DATABASE_URL
        value: CHANGE_ME_TO_YOUR_SUPABASE_URL
