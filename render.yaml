services:
  - type: web
    name: manifest
    env: node
    plan: free
    region: ohio # Match Supabase region for lowest latency
    # Limiting concurrency helps prevent out-of-memory errors on smaller build instances
    buildCommand: npm install --include=dev && npx turbo build --filter=manifest-backend --filter=manifest-frontend --filter=manifest-shared --concurrency=1
    startCommand: npm start
    healthCheckPath: /api/v1/health
    # autoDeploy: false prevents automatic deploys when upstream changes, so you can manually trigger them
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: BIND_ADDRESS
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "1"
      # Limits memory usage to 400MB to avoid OOM crashes on 512MB Free Tier
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      # Set to 'true' to disable new signups after you've created your account
      - key: DISABLE_SIGNUP
        value: "false" 
      # Provide your Render app URL
      - key: BETTER_AUTH_URL
        value: https://manifest-app.onrender.com 
      # Connect your Supabase Postgres URL (Ohio region)
      - key: DATABASE_URL
        value: postgresql://postgres.xxxx:password@aws-0-us-east-2.pooler.supabase.com:6543/postgres # Replace with actual Supabase connection string

databases:
  - name: manifest-db
    databaseName: manifest
    user: manifest
    plan: free